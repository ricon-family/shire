# Agent Run - Reusable workflow for running agents
#
# This workflow is generated by `shimmer workflows:generate`.
# Do not edit directly - update the template in shimmer instead.

name: Agent Run

on:
  workflow_call:
    inputs:
      agent:
        description: 'Agent to run (e.g., c0da, quick)'
        required: true
        type: string
      message:
        description: 'Message/instruction for the agent'
        required: true
        type: string
      model:
        description: 'Claude model to use (optional, defaults to opus)'
        required: false
        type: string
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      AGENT_GITHUB_PAT:
        required: true
      AGENT_GPG_PRIVATE_KEY:
        required: true
      AGENT_EMAIL_PASSWORD:
        required: true
      AGENT_MATRIX_PASSWORD:
        required: false
      AGENT_PASSPHRASE:
        required: false
      AGENT_GITHUB_PASSWORD:
        required: false
      AGENT_B2_ENDPOINT:
        required: false
      AGENT_B2_KEY_ID:
        required: false
      AGENT_B2_APPLICATION_KEY:
        required: false
      AGENT_B2_BUCKET:
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      REPO_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_GITHUB_PAT }}
          path: repo

      - name: Setup workspace
        run: |
          mv repo "$HOME/$REPO_NAME"
          mkdir -p "$HOME/agents/${{ inputs.agent }}"

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Install shiv
        run: curl -fsSL https://shiv.knacklabs.co/install.sh | bash

      - name: Install shimmer
        env:
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_PAT }}
        run: |
          shiv install shimmer
          shiv install notes

      - name: Compute shimmer CLI cache key
        id: shimmer
        run: |
          SHIMMER_DIR="$(shiv which shimmer)"
          echo "mix-lock-hash=$(sha256sum "$SHIMMER_DIR/cli/mix.lock" | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Cache shimmer CLI build
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/shiv/packages/shimmer/cli/_build
            ~/.local/share/shiv/packages/shimmer/cli/deps
          key: ${{ runner.os }}-shimmer-cli-${{ steps.shimmer.outputs.mix-lock-hash }}
          restore-keys: |
            ${{ runner.os }}-shimmer-cli-

      - name: Build shimmer CLI
        run: shimmer cli:build

      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash -s -- stable

      - name: Setup GPG
        env:
          GPG_PRIVATE_KEY: ${{ secrets.AGENT_GPG_PRIVATE_KEY }}
        run: shimmer gpg:setup ${{ inputs.agent }}

      - name: Setup email
        env:
          EMAIL_PASSWORD: ${{ secrets.AGENT_EMAIL_PASSWORD }}
        run: emails setup ${{ inputs.agent }}

      - name: Setup Matrix
        env:
          MATRIX_PASSWORD: ${{ secrets.AGENT_MATRIX_PASSWORD }}
        run: shimmer matrix:login ${{ inputs.agent }}

      - name: Setup blob storage
        env:
          B2_ENDPOINT: ${{ secrets.AGENT_B2_ENDPOINT }}
          B2_KEY_ID: ${{ secrets.AGENT_B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.AGENT_B2_APPLICATION_KEY }}
        run: |
          if [ -n "$B2_ENDPOINT" ] && [ -n "$B2_KEY_ID" ] && [ -n "$B2_APPLICATION_KEY" ]; then
            shimmer blob:setup ${{ inputs.agent }}
          else
            echo "B2 credentials not configured, skipping blob storage setup"
          fi

      - name: Clone zettelkasten
        env:
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_PAT }}
        run: |
          ZETTEL_DIR="$HOME/agents/${{ inputs.agent }}/zettelkasten"
          ZETTEL_REPO="${{ inputs.agent }}-ricon/zettelkasten"

          if gh repo view "$ZETTEL_REPO" --json name > /dev/null 2>&1; then
            echo "Cloning zettelkasten from $ZETTEL_REPO..."
            git clone "https://x-access-token:${GH_TOKEN}@github.com/${ZETTEL_REPO}.git" "$ZETTEL_DIR"
            echo "Zettelkasten available at $ZETTEL_DIR"
          else
            echo "No zettelkasten found for ${{ inputs.agent }}, skipping"
          fi

      - name: Unlock encrypted files
        run: |
          cd "$HOME/$REPO_NAME"
          mise trust -q
          if [ -d ".git-crypt" ]; then
            notes encrypt:install
            notes encrypt:unlock || echo "Warning: notes encrypt:unlock failed — encrypted files may not be readable"
          fi

      - name: Build system prompt
        id: prompt
        run: |
          PROMPT_FILE=$(mktemp)

          # Add agent identity — resolve via the home's agent:identity task
          AGENT_IDENTITY_FILE=$(mise -C "$HOME/$REPO_NAME" run -q agent:identity "${{ inputs.agent }}" 2>/dev/null) || true
          if [ -n "$AGENT_IDENTITY_FILE" ] && [ -f "$AGENT_IDENTITY_FILE" ]; then
            cat "$AGENT_IDENTITY_FILE" >> "$PROMPT_FILE"
          else
            echo "Error: could not resolve agent identity for '${{ inputs.agent }}'."
            echo "Does $REPO_NAME provide an agent:identity task?"
            exit 1
          fi

          # Add dispatch context (who triggered this run)
          if [ -n "$GITHUB_TRIGGERING_ACTOR" ]; then
            echo "" >> "$PROMPT_FILE"
            echo "## Dispatch Context" >> "$PROMPT_FILE"
            echo "This session was triggered by: $GITHUB_TRIGGERING_ACTOR" >> "$PROMPT_FILE"
          fi

          echo "file=$PROMPT_FILE" >> $GITHUB_OUTPUT

      - name: Run CLI
        env:
          AGENT_HOME: $HOME/${{ github.event.repository.name }}
          AGENT_PASSPHRASE: ${{ secrets.AGENT_PASSPHRASE }}
          BROWSER_GITHUB_COM_PASSWORD: ${{ secrets.AGENT_GITHUB_PASSWORD }}
          BROWSER_GITHUB_COM_USERNAME: ${{ inputs.agent }}-ricon
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_PAT }}
          GIT_AUTHOR_EMAIL: ${{ inputs.agent }}@ricon.family
          GIT_AUTHOR_NAME: ${{ inputs.agent }}
          GIT_COMMITTER_EMAIL: ${{ inputs.agent }}@ricon.family
          GIT_COMMITTER_NAME: ${{ inputs.agent }}
          B2_BUCKET: ${{ secrets.AGENT_B2_BUCKET }}
          INPUT_MESSAGE: ${{ inputs.message }}
          INPUT_MODEL: ${{ inputs.model }}
          RUN_TIMEOUT: 900
        run: |
          cd "$HOME/$REPO_NAME"
          echo "### AGENT SESSION START ###"

          CMD=(shimmer agent:run "${{ inputs.agent }}" "$INPUT_MESSAGE"
            --system-prompt-file "${{ steps.prompt.outputs.file }}"
            --timeout "$RUN_TIMEOUT")

          if [ -n "$AGENT_PASSPHRASE" ]; then
            CMD+=(--passphrase "$AGENT_PASSPHRASE")
          fi
          if [ -n "$INPUT_MODEL" ]; then
            CMD+=(--model "$INPUT_MODEL")
          fi

          "${CMD[@]}"

          echo "### AGENT SESSION END ###"
